<!DOCTYPE html>
<html>
<head>
<title>IRBC Attendance</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

body{
background:#2c4a7a;
font-family:Arial;
}

.container{
background:#f2f2f2;
width:900px;
margin:auto;
margin-top:40px;
padding:30px;
border-radius:10px;
text-align:center;
}

h2{
color:#2c4a7a;
margin-bottom:20px;
}

.success{
color:green;
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
font-size:18px;
margin-top:15px;
}

th{
background:#da8c17;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ccc;
}

input[type="text"]{
padding:8px;
width:220px;
font-size:15px;
border-radius:5px;
border:1px solid #ccc;
}

input[type="radio"]{
transform:scale(1.3);
margin-right:6px;
}

.save-btn{
background:#28a745;
color:white;
border:none;
padding:12px 35px;
font-size:17px;
border-radius:6px;
cursor:pointer;
}

.save-btn:hover{
background:#1e7e34;
}

.report-btn{
background:#007bff;
color:white;
border:none;
padding:10px 25px;
font-size:16px;
border-radius:6px;
margin:5px;
cursor:pointer;
}

.report-btn:hover{
background:#0056b3;
}

</style>

<script>

function toggleReason(row,status){

var reason = document.getElementById("reason_"+row);
var rowColor = document.getElementById("row_"+row);

if(status == "Absent"){

reason.required = true;
reason.style.border = "2px solid red";
rowColor.style.background = "#ffe6e6";

}
else{

reason.required = false;
reason.style.border = "1px solid #ccc";
reason.value = "";
rowColor.style.background = "#e6ffe6";

}

}

</script>

</head>

<body>

<div class="container">

<div style="text-align:center;">

  <div style="text-align:center;margin-bottom:20px;">
<img src="{{ url_for('static', filename='logo.png') }}" width="120">

</div>


<h2>IRBC EMPLOYEE ATTENDANCE</h2>

{% if msg %}
<div class="success">✔ {{msg}}</div>
{% endif %}

<form action="/save" method="POST">

<table>

<tr>
<th>Name</th>
<th>Status</th>
<th>Reason</th>
</tr>

{% for emp in employees %}
<tr id="row_{{loop.index}}">

<td>
{{ emp.name }}
<input type="hidden" name="name[]" value="{{ emp.name }}">

<a href="/delete_employee/{{ emp.id }}" 
   onclick="return confirm('Delete this employee?')"
   style="color:red; font-size:14px; margin-left:8px; text-decoration:none;">
   🗑
</a>
  <button style="
    background:#dc3545;
    color:white;
    border:none;
    padding:4px 8px;
    font-size:12px;
    border-radius:4px;
    margin-left:8px;
    cursor:pointer;"
    onmouseover="this.style.background='#b52a37'"
    onmouseout="this.style.background='#dc3545'">
    Delete
</button>



</td>


<td>

<label>
<input type="radio"
name="status_{{loop.index}}"
value="Present"
onclick="toggleReason('{{loop.index}}','Present')">
Present
</label>

<label style="margin-left:15px;">
<input type="radio"
name="status_{{loop.index}}"
value="Absent"
onclick="toggleReason('{{loop.index}}','Absent')">
Absent
</label>


</td>

<td>

<input type="text" id="reason_{{loop.index}}" name="reason[]" placeholder="Reason if absent">


</td>

</tr>
{% endfor %}

</table>

<br><br>

<button class="save-btn" type="submit">Save Attendance</button>

</form>

<br><br>
<a href="/add_employee"><button class="report-btn">Add Employee</button></a>

<a href="/daily"><button class="report-btn">Daily Report</button></a>
<a href="/monthly"><button class="report-btn">Monthly Report</button></a>
<a href="/download"><button class="report-btn">Download Excel</button></a>
<a href="/overtime">
<button class="report-btn">Overtime Entry</button>
</a>
</div>

</body>
</html>
